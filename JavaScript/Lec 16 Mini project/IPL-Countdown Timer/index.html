<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPL 2026 Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">
    <div class="container">

        <!-- IPL Logo -->
        <img src="./ipl-logo.webp" 
             alt="IPL Logo" class="ipl-logo">

        <h1>IPL 2026 IS COMING 🔥</h1>

        <!-- Countdown -->
        <div class="countdown-box">
            <div class="time" id="fullTime">00 : 00 : 00 : 00</div>
            <div class="labels">
                <span>DAYS</span>
                <span>HOURS</span>
                <span>MINUTES</span>
                <span>SECONDS</span>
            </div>
        </div>

        <!-- Trophy -->
        <img src="./ipl-trophy1-removebg-preview.png"
     alt="IPL Trophy"
     class="trophy">

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
